<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boys90 - Lavagna</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    touch-action: none;
  }

  #court {
    position: absolute;
    width: 100vw;
    height: 100vh;
    background-image: url('BOYS_90_BK.png');
    background-size: cover;
    background-position: center;
  }

  .player, .defender, .ball {
    position: absolute;
    font-size: 32px;
    font-weight: bold;
    color: white;
    user-select: none;
    touch-action: none;
  }

  /* Attaccanti */
  .player {
    color: #00ffea;
  }

  /* Difensori */
  .defender {
    color: #ff4040;
  }

  /* Barra rotazione */
  .rotate-bar {
    position: absolute;
    left: -10px;
    width: 6px;
    height: 60px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    touch-action: none;
  }

  /* Palla */
  .ball {
    font-size: 28px;
    color: #ffae00;
  }

  /* Matita e gomma */
  #pencil, #eraser {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 26px;
    padding: 10px 14px;
    background: #222;
    color: white;
    border-radius: 8px;
    margin-right: 10px;
    user-select: none;
  }

  #eraser {
    left: 120px;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>

<body>

<div id="court"></div>

<!-- Matita e gomma -->
<div id="pencil">✏️</div>
<div id="eraser">🧽</div>

<canvas id="drawCanvas"></canvas>

<!-- Attaccanti -->
<div class="player" id="p1">(1)</div>
<div class="player" id="p2">(2)</div>
<div class="player" id="p3">(3)</div>
<div class="player" id="p4">(4)</div>
<div class="player" id="p5">(5)</div>

<!-- Difensori -->
<div class="defender" id="d1">
  <div class="rotate-bar"></div>
  (•)
</div>
<div class="defender" id="d2">
  <div class="rotate-bar"></div>
  (•)
</div>
<div class="defender" id="d3">
  <div class="rotate-bar"></div>
  (•)
</div>
<div class="defender" id="d4">
  <div class="rotate-bar"></div>
  (•)
</div>
<div class="defender" id="d5">
  <div class="rotate-bar"></div>
  (•)
</div>

<!-- Palla -->
<div class="ball" id="ball">🏀</div>

<script>
/* ---------------------- POSIZIONI INIZIALI ---------------------- */
function placeInitial(id, x, y) {
  const el = document.getElementById(id);
  el.style.transform = `translate(${x}px, ${y}px)`;
}

placeInitial("p1", 100, 200);
placeInitial("p2", 200, 300);
placeInitial("p3", 300, 400);
placeInitial("p4", 400, 300);
placeInitial("p5", 500, 200);

placeInitial("d1", 150, 250);
placeInitial("d2", 250, 350);
placeInitial("d3", 350, 450);
placeInitial("d4", 450, 350);
placeInitial("d5", 550, 250);

placeInitial("ball", 320, 320);

/* ---------------------- DRAG GENERALE ---------------------- */
let dragging = null;
let startX, startY, objX, objY;

function pointerDown(e) {
  const el = e.currentTarget;
  if (el.classList.contains("rotate-bar")) return; // rotazione gestita sotto
  dragging = el;
  const rect = el.getBoundingClientRect();
  startX = e.clientX;
  startY = e.clientY;
  objX = rect.left;
  objY = rect.top;
}

function pointerMove(e) {
  if (!dragging) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  dragging.style.transform = `translate(${objX + dx}px, ${objY + dy}px)`;
}

function pointerUp() {
  dragging = null;
}

document.querySelectorAll(".player, .defender, .ball").forEach(el => {
  el.addEventListener("pointerdown", pointerDown);
});

window.addEventListener("pointermove", pointerMove);
window.addEventListener("pointerup", pointerUp);

/* ---------------------- ROTAZIONE DIFENSORI ---------------------- */
let rotating = null;
let rotStartY, rotStartAngle;

document.querySelectorAll(".rotate-bar").forEach(bar => {
  bar.addEventListener("pointerdown", e => {
    e.stopPropagation();
    const defender = bar.parentElement;
    rotating = defender;
    rotStartY = e.clientY;
    rotStartAngle = parseFloat(defender.dataset.angle || "0");
  });
});

window.addEventListener("pointermove", e => {
  if (!rotating) return;
  const dy = e.clientY - rotStartY;
  const angle = rotStartAngle + dy * 0.7;
  rotating.dataset.angle = angle;
  rotating.style.transform = `rotate(${angle}deg)` + rotating.style.transform.replace(/.*translate/, " translate");
});

window.addEventListener("pointerup", () => rotating = null);

/* ---------------------- MATITA E GOMMA ---------------------- */
const canvas = document.getElementById("drawCanvas");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext("2d");

let drawing = false;
let erasing = false;

document.getElementById("pencil").addEventListener("pointerdown", () => {
  drawing = true;
  erasing = false;
});

document.getElementById("eraser").addEventListener("pointerdown", () => {
  erasing = true;
  drawing = false;
});

canvas.addEventListener("pointerdown", e => {
  if (!drawing && !erasing) return;
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.clientX, e.clientY);
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  if (erasing) {
    ctx.clearRect(e.clientX - 10, e.clientY - 10, 20, 20);
  } else {
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#ffffff";
    ctx.lineTo(e.clientX, e.clientY);
    ctx.stroke();
  }
});

canvas.addEventListener("pointerup", () => {
  drawing = false;
});
</script>

</body>
</html>
