<!DOCTYPE html>
<html>
<head>
 <link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icon.png">
  
<meta charset="UTF-8">
<title>Lavagna Basket</title>

<style>

body {
  margin: 0;
  background: #000;
  overflow: hidden;
  font-family: Arial;
}

/* --- BOARD --- */
#board {
  position: relative;
  width: 100vw;
  height: 100vh;
  background-image: url("BOYS_90_BK.png");
  background-size: cover;
  background-position: center;
  touch-action: none;
}

/* --- ATTACCANTI --- */
.player {
  position: absolute;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #ffffff;        /* cerchio bianco */
  color: #000000;             /* numero nero */
  font-size: 32px;
  font-weight: bold;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: grab;
  user-select: none;
  touch-action: none;
  box-shadow: 0 0 10px rgba(0,0,0,0.6); /* visibilità sul campo */
}


/* --- DIFENSORI (più grandi) --- */
 .defender {
  position: absolute;
  color: #000;
  font-weight: bold;
  font-size: 55px;     /* +30% rispetto a 42px */
  cursor: grab;
  user-select: none;
  touch-action: none;
  transform-origin: center center;
}

  .document.querySelectorAll(".defender").forEach(def => {
  let rotating = false;
  let startAngle = 0;
  let initialRotation = 0;
  function getAngle(x, y, rect) {
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    return Math.atan2(y - cy, x - cx) * 180 / Math.PI;
  }

  /* TOUCH START */
  def.addEventListener("touchstart", e => {
    rotating = true;
    const t = e.touches[0];
    const rect = def.getBoundingClientRect();
    startAngle = getAngle(t.clientX, t.clientY, rect);
    initialRotation = parseFloat(def.getAttribute("data-angle") || "0");
  }, { passive: false });

  /* TOUCH MOVE */
  def.addEventListener("touchmove", e => {
    if (!rotating) return;
    const t = e.touches[0];
    const rect = def.getBoundingClientRect();
    const currentAngle = getAngle(t.clientX, t.clientY, rect);
    const delta = currentAngle - startAngle;
    const newAngle = initialRotation + delta;
    def.style.transform = `rotate(${newAngle}deg)`;
    def.setAttribute("data-angle", newAngle);
  }, { passive: false });

  /* TOUCH END */
  def.addEventListener("touchend", () => rotating = false);

  /* MOUSE VERSION */
  def.addEventListener("mousedown", e => {
    rotating = true;
    const rect = def.getBoundingClientRect();
    startAngle = getAngle(e.clientX, e.clientY, rect);
    initialRotation = parseFloat(def.getAttribute("data-angle") || "0");
  });

  document.addEventListener("mousemove", e => {
    if (!rotating) return;
    const rect = def.getBoundingClientRect();
    const currentAngle = getAngle(e.clientX, e.clientY, rect);
    const delta = currentAngle - startAngle;
    const newAngle = initialRotation + delta;
    def.style.transform = `rotate(${newAngle}deg)`;
    def.setAttribute("data-angle", newAngle);
  });

  document.addEventListener("mouseup", () => rotating = false);
});



/* --- PALLA 3D PICCOLA --- */
.ball {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffb347, #ff8c00 60%, #d46a00);
  box-shadow: inset -3px -3px 6px rgba(0,0,0,0.35),
              inset 3px 3px 6px rgba(255,255,255,0.25),
              0 0 8px rgba(0,0,0,0.5);
  cursor: grab;
  user-select: none;
  touch-action: none;
}

.ball::before,
.ball::after {
  content: none !important;
  display: none !important;
}

/* --- CANVAS DISEGNO --- */
#drawLayer {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* --- STRUMENTI --- */
#tools {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 10px;
}

#tools button {
  padding: 10px 18px;
  font-size: 18px;
  font-weight: bold;
  background: #222;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 8px;
  cursor: pointer;
}

#tools button.active {
  background: #ff8c00;
  border-color: #000;
}

#eraserBtn.active {
  background: #ff0000;
}

</style>
</head>

<body>

<div id="board">


  <!-- ATTACCANTI (1–5) -->
<div class="player" style="left:100px; top:200px;">1</div>
<div class="player" style="left:200px; top:300px;">2</div>
<div class="player" style="left:300px; top:250px;">3</div>
<div class="player" style="left:150px; top:400px;">4</div>
<div class="player" style="left:250px; top:450px;">5</div>


  
  <!-- DIFENSORI (•) -->
<div class="defender" style="left:500px; top:200px;">(•</div>
<div class="defender" style="left:600px; top:300px;">(•</div>
<div class="defender" style="left:550px; top:400px;">(•</div>
<div class="defender" style="left:650px; top:250px;">(•</div>
<div class="defender" style="left:700px; top:350px;">(•</div>

  <!-- PALLA -->
  <div class="ball" style="left:300px; top:300px;"></div>


  <!-- CANVAS DISEGNO -->
  <canvas id="drawLayer"></canvas>

</div>

<!-- STRUMENTI -->
<div id="tools">
  <button id="pencilBtn">✏️ Matita</button>
  <button id="eraserBtn">🧽 Gomma</button>
</div>

<script>

/* ---------------------------
   MOVIMENTO GENERICO ELEMENTI
---------------------------- */

function enableDrag(el) {
  let dragging = false;
  let offsetX = 0, offsetY = 0;

  el.addEventListener("mousedown", e => {
    dragging = true;
    const r = el.getBoundingClientRect();
    offsetX = e.clientX - r.left;
    offsetY = e.clientY - r.top;
  });

  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const boardRect = board.getBoundingClientRect();
    let x = e.clientX - boardRect.left - offsetX;
    let y = e.clientY - boardRect.top - offsetY;
    el.style.left = x + "px";
    el.style.top = y + "px";
  });

  document.addEventListener("mouseup", () => dragging = false);

  /* Touch */
  el.addEventListener("touchstart", e => {
    dragging = true;
    const t = e.touches[0];
    const r = el.getBoundingClientRect();
    offsetX = t.clientX - r.left;
    offsetY = t.clientY - r.top;
  }, { passive: false });

  document.addEventListener("touchmove", e => {
    if (!dragging) return;
    const t = e.touches[0];
    const boardRect = board.getBoundingClientRect();
    let x = t.clientX - boardRect.left - offsetX;
    let y = t.clientY - boardRect.top - offsetY;
    el.style.left = x + "px";
    el.style.top = y + "px";
  }, { passive: false });

  document.addEventListener("touchend", () => dragging = false);
}

/* Attiva drag su tutti */
document.querySelectorAll(".player").forEach(enableDrag);
document.querySelectorAll(".defender").forEach(enableDrag);
enableDrag(document.querySelector(".ball"));

/* ---------------------------
   ROTAZIONE DIFENSORI
---------------------------- */

document.querySelectorAll(".defender").forEach(def => {
  def.addEventListener("dblclick", () => {
    let angle = parseInt(def.getAttribute("data-angle") || "0");
    angle += 45;
    def.style.transform = `rotate(${angle}deg)`;
    def.setAttribute("data-angle", angle);
  });
});

/* ---------------------------
   MATITA + GOMMA
---------------------------- */

const board = document.getElementById("board");
const drawLayer = document.getElementById("drawLayer");
const ctx = drawLayer.getContext("2d");

function resizeCanvas() {
  drawLayer.width = board.offsetWidth;
  drawLayer.height = board.offsetHeight;
}
resizeCanvas();

let drawing = false;
let pencilActive = false;
let eraserActive = false;

const pencilBtn = document.getElementById("pencilBtn");
const eraserBtn = document.getElementById("eraserBtn");

/* MATITA */
pencilBtn.addEventListener("click", () => {
  pencilActive = !pencilActive;
  eraserActive = false;

  pencilBtn.classList.toggle("active", pencilActive);
  eraserBtn.classList.remove("active");

  drawLayer.style.pointerEvents = pencilActive ? "auto" : "none";

  ctx.globalCompositeOperation = "source-over";  // MATITA NORMALE
  ctx.strokeStyle = "#ff8c00";
  ctx.lineWidth = 4;
});

/* GOMMA */
eraserBtn.addEventListener("click", () => {
  eraserActive = !eraserActive;
  pencilActive = false;

  eraserBtn.classList.toggle("active", eraserActive);
  pencilBtn.classList.remove("active");

  drawLayer.style.pointerEvents = eraserActive ? "auto" : "none";

  ctx.globalCompositeOperation = "destination-out";  // CANCELLA
  ctx.lineWidth = 30;  // spessore gomma
});

/* DISEGNO */
drawLayer.addEventListener("mousedown", e => {
  if (!pencilActive && !eraserActive) return;
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
});

drawLayer.addEventListener("mousemove", e => {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
});

drawLayer.addEventListener("mouseup", () => drawing = false);

/* Touch */
drawLayer.addEventListener("touchstart", e => {
  if (!pencilActive && !eraserActive) return;
  drawing = true;
  const t = e.touches[0];
  const r = drawLayer.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

drawLayer.addEventListener("touchmove", e => {
  if (!drawing) return;
  const t = e.touches[0];
  const r = drawLayer.getBoundingClientRect();
  ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
  ctx.stroke();
}, { passive: false });

drawLayer.addEventListener("touchend", () => drawing = false);

</script>

</body>
</html>
